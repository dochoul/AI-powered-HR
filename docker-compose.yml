services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hr_chatbot
      POSTGRES_USER: hrbot
      POSTGRES_PASSWORD: hrbot_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrbot -d hr_chatbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - server/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server:/app/server

volumes:
  pgdata:
